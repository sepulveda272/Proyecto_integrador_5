<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIFEX - Productor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../../css/main.css">
</head>

<body>
    <!-- TOPBAR -->
    <div class="topbar">
        <span class="topbar-title">Productor</span>
        <span class="topbar-user">Juan Sebastian Angel Rodriguez</span>
        <button class="btn-salir">Salir</button>
    </div>

    <div class="layout">
        <!-- SIDEBAR -->
        <nav class="sidebar">
            <div class="sidebar-logo">
                <span class="icon">🌿</span>
                <span>SIFEX</span>
            </div>
            <a class="nav-item" href="perfil.html"><span class="icon">👤</span> Perfil</a>
            <a class="nav-item" href="lugarProducción.html"><span class="icon">🌱</span> Lugar de producción</a>
            <a class="nav-item" href="citas.html"><span class="icon">📅</span> Citas</a>
            <div class="sidebar-bottom">
                <button class="btn-hide-menu">← Ocultar menú</button>
            </div>
        </nav>

        <!-- MAIN -->
        <main class="main">

            <div class="contenido-principal">
                <div id="contenido">
                    <!-- ══ VIEW: TABLE ══ -->
                    <div id="view-table" class="view active">
                    <div class="page-header">
                        <h1 class="page-title">Lugares de producción</h1>
                        <button class="btn-agregar" onclick="goToForm()">
                        <span>+</span> Agregar lugar
                        </button>
                    </div>
                    <div class="table-card">
                        <table>
                        <thead>
                            <tr>
                            <th>#</th>
                            <th>Nombre</th>
                            <th>Departamento</th>
                            <th>Municipio</th>
                            <th>Vereda</th>
                            <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="table-body">
                            
                        </tbody>
                        </table>
                    </div>
                    </div>
                
                    <!-- ══ VIEW: FORM ══ -->
                    <div id="view-form" class="view">
                    <div class="form-header">
                        <button class="btn-back" onclick="goToTable()" title="Volver">←</button>
                        <h1 class="page-title" style="font-size:22px;">Crear lugar de producción</h1>
                    </div>
                
                    <!-- Steps -->
                    <div class="steps-indicator">
                        <div class="step active" id="step-indicator-1">
                        <div class="step-num">1</div>
                        <span>Información básica</span>
                        </div>
                        <div class="step-connector" id="connector-1"></div>
                        <div class="step" id="step-indicator-2">
                        <div class="step-num">2</div>
                        <span>Información detallada</span>
                        </div>
                    </div>
                
                    <!-- ── Section 1 ── -->
                    <div id="section-1" class="form-card">
                        <div class="section-title">📍 Información básica del lugar</div>
                
                        <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Nombre del lugar de producción *</label>
                            <input id="f-nombre" class="form-input" type="text" placeholder="Ej. Finca La Esperanza" oninput="onBasicChange()">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Número de predios *</label>
                            <input id="f-num-predios" class="form-input" type="number" min="1" max="20" placeholder="Ej. 2" oninput="onPrediosChange()">
                        </div>
                        </div>
                
                        <div id="predios-container" class="predio-fields"></div>
                    </div>
                
                    <!-- ── Section 2 ── -->
                    <div id="section-2" class="form-card" style="opacity:.45; pointer-events:none; transition: opacity .35s;">
                        <div class="section-title">🗺️ Información detallada</div>
                
                        <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Lugar de producción</label>
                            <input id="f-nombre-ro" class="form-input readonly" type="text" readonly>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Área total (ha) *</label>
                            <input id="f-area-total" class="form-input" type="number" min="0.1" step="0.1" placeholder="Ej. 5.0" oninput="onDetailChange()">
                        </div>
                        </div>
                
                        <div class="form-row single">
                        <div class="form-group">
                            <label class="form-label">Número de lotes *</label>
                            <input id="f-num-lotes" class="form-input" type="number" min="1" max="30" placeholder="Ej. 3" oninput="onLotesChange()">
                        </div>
                        </div>
                
                        <div id="lotes-container" class="lote-cards"></div>
                    </div>
                
                    <div class="form-actions">
                        <button class="btn-sec" onclick="goToTable()">Cancelar</button>
                        <button id="btn-crear" class="btn-primary" disabled onclick="crearLugar()">✔ Crear lugar</button>
                    </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="toast" id="toast"></div>


    <script src="../../js/verificarJs.js"></script>
    <script src="../../js/lugarProJs.js"></script>

    <script src="../../js/productor.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
