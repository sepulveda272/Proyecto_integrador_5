<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIFEX - PRODUCTOR</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../../css/main.css">
</head>

<body>

    <!-- TOPBAR -->
    <div class="topbar">
        <span class="topbar-title">Productor</span>
        <span class="topbar-user"></span>
        <button class="btn-salir">Salir</button>
    </div>

    <div class="layout">

        <!-- SIDEBAR -->
        <nav class="sidebar">
            <div class="sidebar-logo">
                <span class="icon">🌿</span>
                <span>SIFEX</span>
            </div>
            <a class="nav-item" href="perfil.html"><span class="icon">👤</span> Perfil</a>
            <a class="nav-item" href="lugarProducción.html"><span class="icon">🌱</span> Lugar de producción</a>
            <a class="nav-item" href="citas.html"><span class="icon">📅</span> Citas</a>
            <div class="sidebar-bottom">
                <button class="btn-hide-menu" id="toggleSidebar">← Ocultar menú</button>
            </div>
        </nav>

        <!-- MAIN -->
        <main class="main">
            <div class="contenido-principal">
                <div id="contenido">
                    <div class="content">

                        <div class="toprow">
                        <span class="toprow-title">Mi perfil</span>
                        </div>

                        <div class="profile-layout">

                        <!-- Columna izquierda: imagen de perfil -->
                        <div class="profile-sidebar">
                            <div class="profile-avatar-wrapper">
                            <div class="profile-avatar">
                                <img src="../../img/IMG-20230323-WA0019.jpg" alt="Foto de perfil" id="avatar-img">
                                <input type="file" id="avatar-input" accept="image/*" style="display:none">
                            </div>
                            <p class="profile-avatar-hint">C.C 1474927392</p>
                            </div>
                            <div class="profile-sidebar-info">
                            <span class="profile-sidebar-name">Juan Sebastian Angel Rodriguez</span>
                            <span class="profile-sidebar-label">Productor</span>
                            </div>
                        </div>

                        <!-- Columna derecha: formulario -->
                        <div class="profile-form-col">

                            <div class="card">
                            <div class="section-head">Contacto</div>
                            <div class="grid2">
                                <div class="field span2">
                                <label>Dirección</label>
                                <input type="text" placeholder="—">
                                </div>
                                <div class="field">
                                <label>Celular</label>
                                <input type="tel" placeholder="—">
                                </div>
                                <div class="field">
                                <label>Correo electrónico</label>
                                <input type="email" placeholder="—">
                                </div>
                            </div>
                            </div>

                            <div class="actions">
                            <button class="btn-save">Actualizar perfil</button>
                            </div>

                        </div>
                        </div>

                    </div>
                </div>
            </div>
        </main>

    </div>

    <div class="toast" id="toast"></div>

    <script src="../../js/verificarJs.js"></script>


    <script src="../../js/productor.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
