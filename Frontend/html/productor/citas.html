<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIFEX - Productor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../../css/main.css">
</head>

<body>
    <!-- TOPBAR -->
    <div class="topbar">
        <span class="topbar-title">Productor</span>
        <span class="topbar-user">Juan Sebastian Angel Rodriguez</span>
        <button class="btn-salir">Salir</button>
    </div>

    <div class="layout">
        <!-- SIDEBAR -->
        <nav class="sidebar">
            <div class="sidebar-logo">
                <span class="icon">🌿</span>
                <span>SIFEX</span>
            </div>
            <a class="nav-item" href="perfil.html"><span class="icon">👤</span> Perfil</a>
            <a class="nav-item" href="lugarProducción.html"><span class="icon">🌱</span> Lugar de producción</a>
            <a class="nav-item" href="citas.html"><span class="icon">📅</span> Citas</a>
            <div class="sidebar-bottom">
                <button class="btn-hide-menu">← Ocultar menú</button>
            </div>
        </nav>

        <!-- MAIN -->
        <main class="main">

            <div class="contenido-principal">
                <div id="contenido">
                    <div class="header">
                        <div class="filtros">
                            <button class="filtro active">Todos</button>
                            <button class="filtro">Pendiente</button>
                            <button class="filtro">Aceptado</button>
                            <button class="filtro">Rechazado</button>
                        </div>
                        <button id="btnAgregar" onclick="abrirModalCita()" class="btn-primary">+ Solicitar cita</button>
                    </div>

                    <!-- Cards -->
                    <div class="cards-grid">

                        <div class="card">
                            <div class="card__accent card__accent--pendiente"></div>
                            <div class="card__inner">
                                <div class="card-header">
                                    <span class="card-codigo">Abduzcan</span>
                                    <span class="badge badge-revision">Pendiente</span>
                                </div>
                                <div class="card-coords">
                                    <div class="coord-row">
                                        <div class="coord-icon">📅</div>
                                        <span class="coord-text">Fecha inspección: 08/03/2026</span>
                                    </div>
                                    <div class="coord-row">
                                        <div class="coord-icon">👤</div>
                                        <span class="coord-text">Técnico: Benito Camelo</span>
                                    </div>
                                </div>
                            </div>
                            <div class="card-actions">
                                <button class="btn-detalles">Ver detalles ➜</button>
                            </div>
                        </div>

                        <div class="card">
                            <div class="card__accent card__accent--aprobado"></div>
                            <div class="card__inner">
                                <div class="card-header">
                                    <span class="card-codigo">San Cristóbal</span>
                                    <span class="badge badge-aprobado">Completado</span>
                                </div>
                                <div class="card-coords">
                                    <div class="coord-row">
                                        <div class="coord-icon">📅</div>
                                        <span class="coord-text">Fecha inspección: 08/06/2026</span>
                                    </div>
                                    <div class="coord-row">
                                        <div class="coord-icon">👤</div>
                                        <span class="coord-text">Técnico: Camelo Benito</span>
                                    </div>
                                </div>
                            </div>
                            <div class="card-actions">
                                <button class="btn-detalles">Ver detalles ➜</button>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
    </div>
    </div>

    </main>
    </div>

    <div class="toast" id="toast"></div>

    <script src="../../js/productor.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
