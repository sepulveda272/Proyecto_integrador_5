<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIFEX - Productor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../../css/main.css">
</head>

<body>
    <!-- TOPBAR -->
    <div class="topbar">
        <span class="topbar-title">Productor</span>
        <span class="topbar-user">Juan Sebastian Angel Rodriguez</span>
        <button class="btn-salir">Salir</button>
    </div>

    <div class="layout">
        <!-- SIDEBAR -->
        <nav class="sidebar">
            <div class="sidebar-logo">
                <span class="icon">🌿</span>
                <span>SIFEX</span>
            </div>
            <a class="nav-item" href="perfil.html"><span class="icon">👤</span> Perfil</a>
            <a class="nav-item" href="lugarProducción.html"><span class="icon">🌱</span> Lugar de producción</a>
            <a class="nav-item" href="citas.html"><span class="icon">📅</span> Citas</a>
            <div class="sidebar-bottom">
                <button class="btn-hide-menu">← Ocultar menú</button>
            </div>
        </nav>

        <!-- MAIN -->
        <main class="main">

            <div class="contenido-principal">
                <div id="contenido">
                    <div class="header">
                        <div class="filtros">
                            <button class="filtro active" data-filtro="todos">Todos</button>
                            <button class="filtro" data-filtro="pendiente">Pendiente</button>
                            <button class="filtro" data-filtro="aceptado">Aceptado</button>
                            <button class="filtro" data-filtro="rechazado">Rechazado</button>
                        </div>
                        <button id="btnAgregar" onclick="abrirModalCita()" class="btn-primary">+ Solicitar cita</button>
                    </div>

                    <div class="cards-grid" id="cards-grid"></div>
                </div>
            </div>
    </div>
    </div>

    </main>
    </div>

    <div class="toast" id="toast"></div>
    <script src="../../js/citasJs.js"></script>
    <script src="../../js/verificarJs.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
