<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIFEX</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet"  href="../css/main.css">  
</head>
<body class="login-page">
  <div class="card-login">
    <div class="icon-login">🌿</div>
    <h1>SIFEX</h1>
    <p class="subtitle">Acceso al Sistema de Inspección Fitosanitaria para Exportación</p>

    <div class="input-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="tunombre@sifex.gov.co">
    </div>

    <div class="input-group">
        <label>Contraseña</label>
        <input type="password" id="password" placeholder="••••••••">
    </div>

    <button id="btnLogin">Iniciar Sesión</button>

    <div class="forgot">¿Olvidaste tu contraseña?</div>

    <div class="footer-login">
        © 2026 Sistema de Inspección Fitosanitaria para Exportación
    </div>
  </div>

  <script src="../js/loginJs.js"></script>
</body>
</html>
